name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install .

      - name: Lint
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501

      - name: Smoke-generate every project type
        run: |
          pip install pyyaml --quiet
          python - <<'PY'
          import subprocess, sys, tempfile, yaml
          from pathlib import Path

          tmp = Path(tempfile.mkdtemp())
          cases = [
              ("mono", "monolith", None),
              ("mono-nats", "monolith", "nats"),
              ("micro", "microservices", None),
              ("micro-kafka", "microservices", "kafka"),
              ("mini", "minimal", None),
          ]
          sys.path.insert(0, ".")
          from stapel_tools.create_project import create_project
          for name, ptype, broker in cases:
              create_project(name=name, project_type=ptype, title=name,
                             url="https://x.dev", company_name="X",
                             company_email="x@x.dev", modules=["core"],
                             output_dir=tmp, use_submodules=False,
                             init_git=False, broker=broker)
              base = tmp / name / "docker-compose.base.yml"
              if base.exists():
                  yaml.safe_load(base.read_text())
              print("OK", name)
          PY
