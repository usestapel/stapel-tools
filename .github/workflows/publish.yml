name: Publish to PyPI
on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Lint
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501

      - name: Tests
        run: |
          pip install pytest pytest-django django djangorestframework "psycopg[binary]" "stapel-core @ git+https://github.com/usestapel/stapel-core.git" "stapel-gdpr @ git+https://github.com/usestapel/stapel-gdpr.git" "stapel-auth @ git+https://github.com/usestapel/stapel-auth.git" --quiet
          pytest tests/

      - name: Smoke-generate every project type
        run: |
          pip install pyyaml --quiet
          python - <<'PY'
          import subprocess, sys, tempfile, yaml
          from pathlib import Path

          tmp = Path(tempfile.mkdtemp())
          cases = [
              ("mono", "monolith", None, None),
              ("mono-nats", "monolith", "nats", None),
              ("mono-tasknats", "monolith", None, "nats"),
              ("micro", "microservices", None, None),
              ("micro-kafka", "microservices", "kafka", None),
              ("micro-taskkafka", "microservices", None, "kafka"),
              ("mini", "minimal", None, None),
          ]
          sys.path.insert(0, ".")
          from stapel_tools.create_project import create_project
          for name, ptype, broker, task_broker in cases:
              create_project(name=name, project_type=ptype, title=name,
                             url="https://x.dev", company_name="X",
                             company_email="x@x.dev", modules=["core"],
                             output_dir=tmp, use_submodules=False,
                             init_git=False, broker=broker,
                             task_broker=task_broker)
              base = tmp / name / "docker-compose.base.yml"
              if base.exists():
                  yaml.safe_load(base.read_text())
              print("OK", name)
          PY

  # ─── E2E: "оно едет" — the generated project must DRIVE, live, every run ──
  # (owner directive). Every live-run shishka is pinned here forever:
  # entrypoint model imports, kafka silence (inline bus default), a missing
  # proxy rule (generated prefixes), the port lost in redirects
  # (absolute_redirect off + $http_host). Release-gating: publish.yml runs
  # the same job before build.
  e2e-generated-project:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stapel
          POSTGRES_PASSWORD: stapel
          POSTGRES_DB: stapel_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stapel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tools + generated-project runtime deps
        run: |
          pip install -e . --quiet
          pip install pytest pytest-django django djangorestframework "psycopg[binary]" pyyaml \
            django-debug-toolbar debugpy celery redis django-redis \
            "stapel-core @ git+https://github.com/usestapel/stapel-core.git" \
            "stapel-auth @ git+https://github.com/usestapel/stapel-auth.git" \
            "stapel-notifications @ git+https://github.com/usestapel/stapel-notifications.git" \
            "stapel-gdpr @ git+https://github.com/usestapel/stapel-gdpr.git" --quiet

      - name: Generate (stapel-assemble, gates must be green)
        run: stapel-assemble e2e --type monolith --libs auth notifications --output-dir "$RUNNER_TEMP"

      - name: stapel-verify on the generated project (0 required)
        run: stapel-verify "$RUNNER_TEMP/e2e"

      - name: Live circle — migrate, register, OTP from the LOG, verify, login
        working-directory: ${{ runner.temp }}/e2e/svc-e2e
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5432"
          POSTGRES_USER: stapel
          POSTGRES_PASSWORD: stapel
          POSTGRES_DB: stapel_e2e
          REDIS_URL: redis://127.0.0.1:6379/0
        run: python "$GITHUB_WORKSPACE/scripts/e2e_live_circle.py" e2e

      - name: Frontend builds (npm install + vite build; npm ci needs a lockfile the scaffold doesn't ship yet)
        working-directory: ${{ runner.temp }}/e2e/frontend
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Compose validity + live nginx circuit (redirect-port regression)
        working-directory: ${{ runner.temp }}/e2e
        run: |
          docker compose -f docker-compose.local.yml --env-file .env.local config -q
          docker compose --env-file .env config -q
          # Lightest live circuit: nginx (+ its only dependency, the Vite
          # container). Proves the envsubst template renders, nginx STARTS
          # without the backend (deferred upstream resolution), and the
          # owner-canon redirect: /e2e (no slash) -> 301 with a RELATIVE
          # Location (absolute_redirect off + $http_host — the ":8080 loses
          # the port" regression, permanently).
          docker compose -f docker-compose.local.yml --env-file .env.local up -d nginx
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://localhost:8080/e2e && break
            sleep 1
          done
          response=$(curl -sI http://localhost:8080/e2e | tr -d '\r')
          echo "$response"
          echo "$response" | grep -q "^HTTP/1.1 301"
          echo "$response" | grep -q "^Location: /e2e/$"
          # Owner postmortem ("/calendar page vs backend" collision): a
          # generated lib reservation must NEVER swallow the module's BARE
          # root — that's the frontend router's page space. /auth is the
          # stand-in module here (already installed on this project; no
          # extra pip dep to add just for this nginx-only check). Wait for
          # the frontend's real upstream (Vite, nginx's only dependency) to
          # actually be ready — unlike the /e2e redirect above (answered by
          # nginx itself, pre-upstream), a 200 here proves the catch-all
          # served it.
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/auth)
            [ "$code" = "200" ] && break
            sleep 1
          done
          bare_response=$(curl -sI http://localhost:8080/auth | tr -d '\r')
          echo "$bare_response"
          echo "$bare_response" | grep -q "^HTTP/1.1 200"
          if echo "$bare_response" | grep -q "^Location: /auth/$"; then
            echo "REGRESSION: /auth (bare module root) redirected into the backend reservation — it must stay the frontend's"
            exit 1
          fi
          # ...and the module's reserved API sub-path still resolves into the
          # backend reservation: svc-e2e is NOT running in this nginx-only
          # circuit, so a 502 from nginx's own failed upstream attempt PROVES
          # routing went there — the frontend catch-all would otherwise
          # happily 200 an unknown SPA route instead.
          api_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/auth/api/v1/x)
          echo "auth/api/v1/x -> $api_code"
          [ "$api_code" = "502" ]
          docker compose -f docker-compose.local.yml --env-file .env.local down -v

  build:
    needs: [test, e2e-generated-project]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build --quiet
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
