name: Publish to PyPI
on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Lint
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501

      - name: Tests
        run: |
          pip install pytest django djangorestframework "stapel-core>=0.8,<0.9" --quiet
          pytest tests/

      - name: Smoke-generate every project type
        run: |
          pip install pyyaml --quiet
          python - <<'PY'
          import subprocess, sys, tempfile, yaml
          from pathlib import Path

          tmp = Path(tempfile.mkdtemp())
          cases = [
              ("mono", "monolith", None, None),
              ("mono-nats", "monolith", "nats", None),
              ("mono-tasknats", "monolith", None, "nats"),
              ("micro", "microservices", None, None),
              ("micro-kafka", "microservices", "kafka", None),
              ("micro-taskkafka", "microservices", None, "kafka"),
              ("mini", "minimal", None, None),
          ]
          sys.path.insert(0, ".")
          from stapel_tools.create_project import create_project
          for name, ptype, broker, task_broker in cases:
              create_project(name=name, project_type=ptype, title=name,
                             url="https://x.dev", company_name="X",
                             company_email="x@x.dev", modules=["core"],
                             output_dir=tmp, use_submodules=False,
                             init_git=False, broker=broker,
                             task_broker=task_broker)
              base = tmp / name / "docker-compose.base.yml"
              if base.exists():
                  yaml.safe_load(base.read_text())
              print("OK", name)
          PY

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build --quiet
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
